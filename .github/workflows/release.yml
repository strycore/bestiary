name: Release

# Push a v* tag or run the workflow manually with a tag input. Builds Linux
# x86_64 + aarch64 release binaries (native arm64 runner, no cross-compile),
# packages each with README/SPEC/LICENSE alongside, generates SHA-256
# sidecars, and publishes one GitHub release with auto-generated notes.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.1.0). Created at the selected commit if it doesn't exist."
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: bestiary

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$ ]]; then
            echo "::error::tag '$tag' must match vMAJOR.MINOR.PATCH[-suffix]"
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: resolve
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs_on: ubuntu-latest
            archive_suffix: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runs_on: ubuntu-24.04-arm
            archive_suffix: linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip
        run: strip target/${{ matrix.target }}/release/${{ env.BIN_NAME }}

      - name: Package
        id: pkg
        run: |
          version="${{ needs.resolve.outputs.version }}"
          stage="$(mktemp -d)"
          cp target/${{ matrix.target }}/release/${{ env.BIN_NAME }} "$stage/"
          cp README.md SPEC.md LICENSE "$stage/"
          archive="${{ env.BIN_NAME }}-${version}-${{ matrix.archive_suffix }}.tar.gz"
          tar -C "$stage" -czf "$archive" .
          sha256sum "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_suffix }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.archive }}.sha256
          if-no-files-found: error

  release:
    name: Publish
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
