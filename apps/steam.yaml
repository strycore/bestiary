name: steam
display_name: Steam
category: gaming
homepage: https://store.steampowered.com
locations:
  native:
    config: ~/.steam
    data: ~/.local/share/Steam
    state:
      - ~/.steampid
      - ~/.steampath
backup_exclude:
  - "appcache/*"
  - "steamapps/downloading/*"
  - "logs/*"
  - "package/*"
tags: [valve, game-launcher]
