name: steam
display_name: Steam
category: game-launcher
homepage: https://store.steampowered.com
locations:
  native:
    config: ~/.steam
    data: ~/.local/share/Steam
    state:
    - ~/.steampid
    - ~/.steampath
    - ~/.steam-stdout.log
backup_exclude:
- appcache/*
- steamapps/downloading/*
- logs/*
- package/*
tags:
- valve
- game-launcher
